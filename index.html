<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Twelve-Factor App Assessment</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
 
  <button class="theme-toggle" id="themeBtn" title="Toggle dark mode" onclick="toggleTheme()">
    <span id="themeIcon">🌙</span>
  </button>
 
  <div class="shell">
    <header>
      <div class="eyebrow">Self-assessment tool</div>
      <h1>Twelve-Factor App</h1>
      <p class="subtitle">Answer 12 questions to see how well your deployment practices align with the twelve-factor methodology.</p>
    </header>
 
    <div class="progress-row">
      <span class="progress-label" id="counter">Loading…</span>
      <span class="progress-label" id="pct">0%</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progress" style="width:0%"></div>
    </div>
 
    <div id="quiz-area">
      <div class="loading">Loading questions…</div>
    </div>
  </div>
 
  <div class="footer-note">Based on <a href="https://12factor.net" target="_blank">12factor.net</a> methodology</div>
 
  <script src="script.js"></script>
</body>
</html>
